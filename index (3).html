  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ocus,select:focus,textarea:focus{border-color:#c9a15a !important}\n  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"background:#1b3a2b\">\n\n<!-- TOP BAR -->\n<sc-if value=\"{{ showTopBar }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"background:#142e21;border-bottom:1px solid rgba(201,161,90,.18)\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;height:42px;display:flex;align-items:center;justify-content:space-between;gap:20px\">\n    <div style=\"display:flex;align-items:center;gap:22px;font:500 12.5px/1 Manrope,sans-serif;letter-spacing:.04em;color:#b7b0a6\">\n      <span style=\"color:#c9a15a;font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:11px\">Est. 1988<\u002Fspan>\n      <span style=\"opacity:.5\">·<\u002Fspan>\n      <span>Licensed London Private Hire &amp; Chauffeur Service<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;font:500 12.5px/1 Manrope,sans-serif;color:#b7b0a6\">\n      <a href=\"mailto:{{ email }}\" style=\"color:#b7b0a6\">{{ email }}<\u002Fa>\n      <span style=\"opacity:.4\">·<\u002Fspan>\n      <span style=\"color:#e8e4db\">24/7 Reservations <b style=\"color:#c9a15a\">{{ phone }}<\u002Fb><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- HEADER -->\n<header style=\"position:sticky;top:0;z-index:50;background:rgba(24,54,40,.94);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,161,90,.18)\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;height:78px;display:flex;align-items:center;justify-content:space-between;gap:24px\">\n    <a href=\"#top\" style=\"display:flex;align-items:center\"><img src=\"dd8b4356-7a19-4e06-a96f-ad64e4a17029\" alt=\"Hyde Park Executive Cars\" style=\"height:46px;width:auto;display:block\"><\u002Fa>\n    <nav style=\"display:flex;align-items:center;gap:30px;font:600 13.5px/1 Manrope,sans-serif;letter-spacing:.03em\">\n      <a href=\"#services\" style=\"color:#e8e4db\">Services<\u002Fa>\n      <a href=\"#fleet\" style=\"color:#e8e4db\">Fleet<\u002Fa>\n      <a href=\"#hotels\" style=\"color:#e8e4db\">Hotel Partners<\u002Fa>\n      <a href=\"#about\" style=\"color:#e8e4db\">About<\u002Fa>\n      <a href=\"#contact\" style=\"color:#e8e4db\">Contact<\u002Fa>\n      <a href=\"#book\" style=\"display:inline-flex;align-items:center;gap:9px;background:#c9a15a;color:#1e3a2d;padding:12px 22px;border-radius:2px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:12px\">Book a Car<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- HERO + BOOKING -->\n<section id=\"top\" style=\"position:relative;overflow:hidden\">\n  <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,#efe9dd 0 16px,#f4efe6 16px 32px)\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:flex-start;padding:20px 26px\"><span style=\"font:11px/1 ui-monospace,monospace;color:rgba(60,74,62,.55);letter-spacing:.1em\">IMAGE — S-CLASS AT HYDE PARK CORNER, DUSK<\u002Fspan><\u002Fdiv>\n  <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(245,242,236,.97) 0%,rgba(245,242,236,.82) 46%,rgba(245,242,236,.5) 100%)\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:1240px;margin:0 auto;padding:82px 40px 96px;display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center\">\n\n    <div id=\"book\" style=\"max-width:560px\">\n      <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#a8843f;margin-bottom:22px\">London · Airports · Nationwide<\u002Fdiv>\n      <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:60px;line-height:1.04;color:#1c342a;margin:0 0 22px;letter-spacing:-.01em\">Chauffeured with quiet distinction — since 1988.<\u002Fh1>\n      <p style=\"font:400 17px/1.65 Manrope,sans-serif;color:#41493f;margin:0 0 34px;max-width:480px\">Fixed rates, complimentary meet &amp; greet and a professionally vetted chauffeur for every journey. Airport transfers, day hire, Silverstone, Bicester Village and Southampton cruise transfers across London and beyond.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px 10px\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(45,90,70,.4);color:#284034;padding:9px 15px;border-radius:2px;font:600 12px/1 Manrope,sans-serif;letter-spacing:.04em\">Fixed rates · no hidden charges<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(45,90,70,.4);color:#284034;padding:9px 15px;border-radius:2px;font:600 12px/1 Manrope,sans-serif;letter-spacing:.04em\">Meet &amp; greet included<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(45,90,70,.4);color:#284034;padding:9px 15px;border-radius:2px;font:600 12px/1 Manrope,sans-serif;letter-spacing:.04em\">Live flight tracking<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- BOOKING WIDGET -->\n    <div style=\"background:#f5f2ec;border:1px solid #e2d8c4;border-radius:5px;box-shadow:0 30px 70px -30px rgba(0,0,0,.7);overflow:hidden;animation:fadeUp .6s ease both\">\n      <div style=\"background:#1e3a2d;padding:20px 26px;display:flex;align-items:center;justify-content:space-between\">\n        <div>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:#f5f2ec;line-height:1\">Reserve Your Journey<\u002Fdiv>\n          <div style=\"font:500 12px/1 Manrope,sans-serif;color:#9a9488;margin-top:5px\">Request a quote — we confirm within the hour<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-size:13px;color:#c9a15a;letter-spacing:.05em\">Step {{ step }}/4<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- progress -->\n      <div style=\"display:flex;gap:4px;padding:14px 26px 0;background:#f5f2ec\">\n        <sc-for list=\"{{ progress }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <div style=\"{{ p.style }}\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"padding:22px 26px 26px;min-height:322px\">\n\n        <!-- STEP 1 -->\n        <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;margin:0 0 12px\">Type of service<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px\">\n            <sc-for list=\"{{ services }}\" as=\"svc\" hint-placeholder-count=\"4\">\n              <button type=\"button\" sc-camel-on-click=\"{{ svc.onSelect }}\" style=\"{{ svc.style }}\">\n                <span style=\"font:700 14px/1.2 Manrope,sans-serif;color:#1a1a1a;display:block\">{{ svc.label }}<\u002Fspan>\n                <span style=\"font:500 11.5px/1.3 Manrope,sans-serif;color:#8a8175;display:block;margin-top:3px\">{{ svc.note }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;margin:0 0 12px\">Journey type<\u002Fdiv>\n          <div style=\"display:flex;gap:9px\">\n            <sc-for list=\"{{ trips }}\" as=\"tr\" hint-placeholder-count=\"3\">\n              <button type=\"button\" sc-camel-on-click=\"{{ tr.onSelect }}\" style=\"{{ tr.style }}\">{{ tr.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 2 -->\n        <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"margin-bottom:14px\">\n            <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Pick-up address<\u002Flabel>\n            <input value=\"{{ f.from }}\" sc-camel-on-change=\"{{ setFrom }}\" placeholder=\"Postcode, hotel or address\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n          <\u002Fdiv>\n          <sc-if value=\"{{ f.showVia }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:14px\">\n            <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Via (stop-off)<\u002Flabel>\n            <input value=\"{{ f.via }}\" sc-camel-on-change=\"{{ setVia }}\" placeholder=\"Additional stop\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"margin-bottom:6px\">\n            <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Destination<\u002Flabel>\n            <input value=\"{{ f.to }}\" sc-camel-on-change=\"{{ setTo }}\" placeholder=\"Postcode, airport or address\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n          <\u002Fdiv>\n          <button type=\"button\" sc-camel-on-click=\"{{ toggleVia }}\" style=\"background:none;border:none;color:#a8843f;font:600 12px/1 Manrope,sans-serif;cursor:pointer;padding:8px 0;margin-bottom:8px\">{{ viaLabel }}<\u002Fbutton>\n\n          <div style=\"display:grid;grid-template-columns:1.2fr .8fr;gap:10px;margin-bottom:14px\">\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Pick-up date<\u002Flabel>\n              <input type=\"date\" value=\"{{ f.date }}\" sc-camel-on-change=\"{{ setDate }}\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Time<\u002Flabel>\n              <input type=\"time\" value=\"{{ f.time }}\" sc-camel-on-change=\"{{ setTime }}\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ isReturn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;grid-template-columns:1.2fr .8fr;gap:10px;margin-bottom:14px;padding-top:14px;border-top:1px dashed #ddd2bd\">\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Return date<\u002Flabel>\n              <input type=\"date\" value=\"{{ f.rdate }}\" sc-camel-on-change=\"{{ setRdate }}\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Return time<\u002Flabel>\n              <input type=\"time\" value=\"{{ f.rtime }}\" sc-camel-on-change=\"{{ setRtime }}\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isDayHire }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:4px\">\n            <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Duration (hours)<\u002Flabel>\n            <sc-raw-select value=\"{{ f.hours }}\" sc-camel-on-change=\"{{ setHours }}\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n              <option value=\"\">Select hours…<\u002Foption>\n              <sc-for list=\"{{ hoursList }}\" as=\"h\" hint-placeholder-count=\"0\"><option value=\"{{ h }}\">{{ h }} hours<\u002Foption><\u002Fsc-for>\n            <\u002Fsc-raw-select>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isAirport }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-bottom:4px\">\n            <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Flight number <span style=\"color:#a89e8e;font-weight:500;text-transform:none;letter-spacing:0\">(for meet &amp; greet)<\u002Fspan><\u002Flabel>\n            <input value=\"{{ f.flight }}\" sc-camel-on-change=\"{{ setFlight }}\" placeholder=\"e.g. BA 216\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 3 -->\n        <sc-if value=\"{{ isStep3 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px\">\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Passengers<\u002Flabel>\n              <sc-raw-select value=\"{{ f.pax }}\" sc-camel-on-change=\"{{ setPax }}\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n                <sc-for list=\"{{ paxList }}\" as=\"p\" hint-placeholder-count=\"0\"><option value=\"{{ p }}\">{{ p }}<\u002Foption><\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Luggage<\u002Flabel>\n              <sc-raw-select value=\"{{ f.luggage }}\" sc-camel-on-change=\"{{ setLuggage }}\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n                <sc-for list=\"{{ luggageList }}\" as=\"l\" hint-placeholder-count=\"0\"><option value=\"{{ l }}\">{{ l }}<\u002Foption><\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;margin:0 0 10px\">Preferred vehicle<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px\">\n            <sc-for list=\"{{ vehicles }}\" as=\"v\" hint-placeholder-count=\"4\">\n              <button type=\"button\" sc-camel-on-click=\"{{ v.onSelect }}\" style=\"{{ v.style }}\">\n                <span style=\"font:700 13.5px/1.1 Manrope,sans-serif;color:#1a1a1a;display:block\">{{ v.label }}<\u002Fspan>\n                <span style=\"font:500 11px/1.3 Manrope,sans-serif;color:#8a8175;display:block;margin-top:3px\">{{ v.note }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div>\n            <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Special requests<\u002Flabel>\n            <textarea value=\"{{ f.notes }}\" sc-camel-on-change=\"{{ setNotes }}\" placeholder=\"Child seats, accessibility, waiting time, corporate account…\" rows=\"2\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none;resize:vertical\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- STEP 4 -->\n        <sc-if value=\"{{ isStep4 }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"background:#efe9dd;border:1px solid #e2d8c4;border-radius:3px;padding:13px 15px;margin-bottom:16px;font:500 13px/1.5 Manrope,sans-serif;color:#5a5348\">\n            <span style=\"color:#a8843f;font-weight:700\">{{ summaryService }}<\u002Fspan> · {{ summaryRoute }}\n          <\u002Fdiv>\n          <div style=\"margin-bottom:13px\">\n            <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Full name<\u002Flabel>\n            <input value=\"{{ f.name }}\" sc-camel-on-change=\"{{ setName }}\" placeholder=\"Your name\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px\">\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Email<\u002Flabel>\n              <input type=\"email\" value=\"{{ f.email }}\" sc-camel-on-change=\"{{ setEmail }}\" placeholder=\"you@email.com\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#7a7268;display:block;margin-bottom:7px\">Phone<\u002Flabel>\n              <input type=\"tel\" value=\"{{ f.phone }}\" sc-camel-on-change=\"{{ setPhone }}\" placeholder=\"Mobile number\" style=\"width:100%;padding:12px 14px;background:#fff;border:1px solid #d8cdb8;border-radius:2px;font-size:15px;color:#1a1a1a;outline:none\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font:500 12px/1.5 Manrope,sans-serif;color:#8a8175;margin:0\">No payment is taken now. We confirm availability and a fixed, all-inclusive price by return.<\u002Fp>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- CONFIRMATION -->\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:34px 6px 10px\">\n          <div style=\"width:58px;height:58px;border-radius:50%;border:2px solid #c9a15a;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px;color:#c9a15a\">✓<\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#1a1a1a;margin-bottom:10px\">Request received, {{ firstName }}<\u002Fdiv>\n          <p style=\"font:500 14px/1.6 Manrope,sans-serif;color:#6a6357;max-width:330px;margin:0 auto 22px\">Thank you. A reservations agent will confirm your chauffeur and a fixed quote shortly — most within the hour, 24/7.<\u002Fp>\n          <button type=\"button\" sc-camel-on-click=\"{{ reset }}\" style=\"background:none;border:1px solid #c9a15a;color:#a8843f;padding:11px 22px;border-radius:2px;font:700 12px/1 Manrope,sans-serif;letter-spacing:.05em;text-transform:uppercase;cursor:pointer\">Make another booking<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- FOOTER NAV -->\n      <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;gap:10px;padding:0 26px 24px;background:#f5f2ec\">\n        <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ false }}\">\n        <button type=\"button\" sc-camel-on-click=\"{{ back }}\" style=\"flex:0 0 auto;background:#fff;border:1px solid #d8cdb8;color:#5a5348;padding:14px 22px;border-radius:2px;font:700 13px/1 Manrope,sans-serif;cursor:pointer\">Back<\u002Fbutton>\n        <\u002Fsc-if>\n        <button type=\"button\" sc-camel-on-click=\"{{ primary }}\" style=\"flex:1;background:#1e3a2d;border:none;color:#f5f2ec;padding:14px 22px;border-radius:2px;font:700 13px/1 Manrope,sans-serif;letter-spacing:.05em;cursor:pointer\">{{ primaryLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SERVICES -->\n<section id=\"services\" style=\"background:#f5f2ec;padding:96px 0\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px\">\n    <div style=\"text-align:center;max-width:640px;margin:0 auto 56px\">\n      <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#a8843f;margin-bottom:16px\">What we do<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:44px;line-height:1.08;color:#1c342a;margin:0 0 16px\">Every journey, handled with care<\u002Fh2>\n      <p style=\"font:400 16px/1.65 Manrope,sans-serif;color:#5a5348;margin:0\">From a quiet airport run to a full day at Silverstone, we tailor the car, the chauffeur and the timing to you.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n      <sc-for list=\"{{ serviceCards }}\" as=\"c\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border:1px solid #e6ddcb;border-radius:5px;overflow:hidden;display:flex;flex-direction:column\">\n          <div style=\"height:172px;background:repeating-linear-gradient(135deg,#e9e3d7 0 12px,#f0eae0 12px 24px);position:relative;display:flex;align-items:flex-end;padding:14px\">\n            <span style=\"font:10.5px/1 ui-monospace,monospace;color:#b0a48c;letter-spacing:.05em\">{{ c.img }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:26px 26px 28px;flex:1;display:flex;flex-direction:column\">\n            <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:25px;color:#1c342a;margin:0 0 9px\">{{ c.title }}<\u002Fh3>\n            <p style=\"font:400 14px/1.6 Manrope,sans-serif;color:#5f584c;margin:0 0 18px;flex:1\">{{ c.desc }}<\u002Fp>\n            <a href=\"#book\" style=\"font:700 12px/1 Manrope,sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#a8843f\">Book this →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TRUST BAND -->\n<section style=\"background:#1e3a2d;padding:70px 0;border-top:1px solid rgba(201,161,90,.18);border-bottom:1px solid rgba(201,161,90,.18)\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:repeat(5,1fr);gap:20px\">\n    <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"5\">\n      <div style=\"text-align:center;padding:0 8px\">\n        <div style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;line-height:1;color:#c9a15a;margin-bottom:12px\">{{ s.big }}<\u002Fdiv>\n        <div style=\"font:600 12.5px/1.4 Manrope,sans-serif;letter-spacing:.03em;color:#d8d2c6\">{{ s.label }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FLEET (brief) -->\n<section id=\"fleet\" style=\"background:#1e3a2d;padding:96px 0\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:.9fr 1.1fr;gap:60px;align-items:center\">\n    <div>\n      <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#c9a15a;margin-bottom:16px\">The fleet<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:44px;line-height:1.08;color:#f5f2ec;margin:0 0 18px\">Immaculate cars, chosen for the occasion<\u002Fh2>\n      <p style=\"font:400 16px/1.65 Manrope,sans-serif;color:#bdb7ac;margin:0 0 26px\">Late-plate, meticulously maintained vehicles — from executive saloons to eight-seat people carriers and full-size coaches. Tell us the party size and we’ll match the car.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <sc-for list=\"{{ fleet }}\" as=\"v\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:13px 0;border-bottom:1px solid rgba(201,161,90,.16)\">\n            <span style=\"font:600 15px/1.2 Manrope,sans-serif;color:#f0ece2\">{{ v.name }}<\u002Fspan>\n            <span style=\"font:500 13px/1.2 Manrope,sans-serif;color:#9a938a\">{{ v.cap }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n      <div style=\"grid-column:1/3;height:230px;background:repeating-linear-gradient(135deg,#254536 0 14px,#204030 14px 28px);border:1px solid rgba(201,161,90,.14);border-radius:4px;display:flex;align-items:flex-end;padding:16px\"><span style=\"font:10.5px/1 ui-monospace,monospace;color:rgba(201,161,90,.55)\">IMAGE — MERCEDES S-CLASS, THREE-QUARTER FRONT<\u002Fspan><\u002Fdiv>\n      <div style=\"height:150px;background:repeating-linear-gradient(135deg,#254536 0 14px,#204030 14px 28px);border:1px solid rgba(201,161,90,.14);border-radius:4px;display:flex;align-items:flex-end;padding:14px\"><span style=\"font:10.5px/1 ui-monospace,monospace;color:rgba(201,161,90,.55)\">IMAGE — V-CLASS<\u002Fspan><\u002Fdiv>\n      <div style=\"height:150px;background:repeating-linear-gradient(135deg,#254536 0 14px,#204030 14px 28px);border:1px solid rgba(201,161,90,.14);border-radius:4px;display:flex;align-items:flex-end;padding:14px\"><span style=\"font:10.5px/1 ui-monospace,monospace;color:rgba(201,161,90,.55)\">IMAGE — INTERIOR<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOTEL PARTNERS -->\n<section id=\"hotels\" style=\"background:#f5f2ec;padding:96px 0\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1.1fr .9fr;gap:64px;align-items:center\">\n    <div>\n      <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#a8843f;margin-bottom:16px\">For hotels &amp; concierge<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:44px;line-height:1.08;color:#1c342a;margin:0 0 18px\">Become a preferred transport partner<\u002Fh2>\n      <p style=\"font:400 16px/1.65 Manrope,sans-serif;color:#5a5348;margin:0 0 28px\">We’ve looked after London’s finest guests since 1988. Make Hyde Park Executive Cars your house car service and earn commission on every ride your concierge books — with priority dispatch, account billing and a dedicated line for your front desk.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px 32px;margin-bottom:32px\">\n        <sc-for list=\"{{ partnerPerks }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <div>\n            <div style=\"font:700 15px/1.3 Manrope,sans-serif;color:#1c342a;margin-bottom:5px\">{{ p.title }}<\u002Fdiv>\n            <div style=\"font:400 13.5px/1.55 Manrope,sans-serif;color:#6a6357\">{{ p.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:9px;background:#1e3a2d;color:#f5f2ec;padding:15px 30px;border-radius:2px;font:700 12.5px/1 Manrope,sans-serif;letter-spacing:.06em;text-transform:uppercase\">Partner with us →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"background:#1e3a2d;border-radius:6px;padding:44px 40px;color:#e8e4db\">\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:56px;line-height:1;color:#c9a15a;margin-bottom:6px\">Commission<\u002Fdiv>\n      <p style=\"font:400 15px/1.65 Manrope,sans-serif;color:#bdb7ac;margin:0 0 28px\">on every completed journey booked through your property — paid monthly, no minimums.<\u002Fp>\n      <div style=\"height:1px;background:rgba(201,161,90,.2);margin-bottom:24px\"><\u002Fdiv>\n      <sc-for list=\"{{ partnerStats }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:11px 0\">\n          <span style=\"font:500 14px/1.3 Manrope,sans-serif;color:#bdb7ac\">{{ p.label }}<\u002Fspan>\n          <span style=\"font-family:'Cormorant Garamond',serif;font-size:24px;color:#f5f2ec\">{{ p.val }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<section id=\"about\" style=\"background:#e9efe6;padding:100px 0\">\n  <div style=\"max-width:900px;margin:0 auto;padding:0 40px;text-align:center\">\n    <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#a8843f;margin-bottom:20px\">Since 1988<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:46px;line-height:1.12;color:#1c342a;margin:0 0 26px\">Nearly four decades at the wheel of London<\u002Fh2>\n    <p style=\"font:400 18px/1.75 Manrope,sans-serif;color:#41493f;margin:0 0 20px\">Hyde Park Executive Cars has served the discerning traveller from Chelsea, Kensington and beyond since 1988. What began as a handful of cars is today a comprehensive chauffeur service trusted by hotels, corporate accounts and private clients alike.<\u002Fp>\n    <p style=\"font:400 18px/1.75 Manrope,sans-serif;color:#41493f;margin:0\">Our promise is unchanged: a professionally vetted, well-spoken chauffeur, an immaculate car, a fixed and honest price — and the quiet reliability that has kept our clients coming back for generations.<\u002Fp>\n    <div style=\"display:flex;justify-content:center;gap:40px;margin-top:44px;flex-wrap:wrap\">\n      <sc-for list=\"{{ testimonials }}\" as=\"t\" hint-placeholder-count=\"2\">\n        <div style=\"max-width:340px;text-align:left;border-left:2px solid #c9a15a;padding-left:20px\">\n          <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;line-height:1.5;color:#233029;margin:0 0 12px\">“{{ t.quote }}”<\u002Fp>\n          <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#6f766c\">{{ t.who }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT / CTA -->\n<section id=\"contact\" style=\"background:#f5f2ec;padding:96px 0\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center\">\n    <div>\n      <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.3em;text-transform:uppercase;color:#a8843f;margin-bottom:16px\">Reservations · 24/7<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:46px;line-height:1.08;color:#1c342a;margin:0 0 22px\">Speak to us any hour, any day<\u002Fh2>\n      <p style=\"font:400 16px/1.65 Manrope,sans-serif;color:#5a5348;margin:0 0 30px\">Prefer to talk it through? Our reservations desk never closes. Call for last-minute cars, account enquiries or bespoke itineraries.<\u002Fp>\n      <a href=\"tel:{{ telHref }}\" style=\"display:block;font-family:'Cormorant Garamond',serif;font-size:40px;color:#1c342a;margin-bottom:8px\">{{ phone }}<\u002Fa>\n      <a href=\"mailto:{{ email }}\" style=\"font:600 15px/1 Manrope,sans-serif;color:#a8843f\">{{ email }}<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #e6ddcb;border-radius:5px;padding:38px 38px\">\n      <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#1c342a;margin-bottom:22px\">Hyde Park Executive Cars<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px\">\n        <div>\n          <div style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#a8843f;margin-bottom:6px\">Office<\u002Fdiv>\n          <div style=\"font:400 15px/1.6 Manrope,sans-serif;color:#3a352d\">16 Hogarth Place<br>London, SW5 0QH<br>United Kingdom<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font:600 11px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#a8843f;margin-bottom:6px\">Company<\u002Fdiv>\n          <div style=\"font:400 15px/1.6 Manrope,sans-serif;color:#3a352d\">Company Number 08311629<\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"#book\" style=\"margin-top:6px;text-align:center;background:#1e3a2d;color:#f5f2ec;padding:15px;border-radius:2px;font:700 12.5px/1 Manrope,sans-serif;letter-spacing:.06em;text-transform:uppercase\">Book online now →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"background:#142e21;padding:60px 0 40px;border-top:1px solid rgba(201,161,90,.18)\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 40px\">\n    <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:48px;padding-bottom:44px;border-bottom:1px solid rgba(201,161,90,.14)\">\n      <div>\n        <img src=\"dd8b4356-7a19-4e06-a96f-ad64e4a17029\" alt=\"Hyde Park Executive Cars\" style=\"height:52px;width:auto;display:block;margin-bottom:20px\">\n        <p style=\"font:400 14px/1.7 Manrope,sans-serif;color:#8a8478;margin:0;max-width:340px\">London’s trusted chauffeur and private hire service since 1988. Fixed rates, meet &amp; greet, and a fleet ready 24 hours a day.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#c9a15a;margin-bottom:18px\">Services<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font:400 14px/1 Manrope,sans-serif\">\n          <a href=\"#services\" style=\"color:#b7b0a6\">Airport transfers<\u002Fa>\n          <a href=\"#services\" style=\"color:#b7b0a6\">Day hire<\u002Fa>\n          <a href=\"#services\" style=\"color:#b7b0a6\">Silverstone &amp; events<\u002Fa>\n          <a href=\"#services\" style=\"color:#b7b0a6\">Bicester Village<\u002Fa>\n          <a href=\"#services\" style=\"color:#b7b0a6\">Southampton cruise port<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font:600 12px/1 Manrope,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#c9a15a;margin-bottom:18px\">Contact<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font:400 14px/1.5 Manrope,sans-serif;color:#b7b0a6\">\n          <a href=\"tel:{{ telHref }}\" style=\"color:#b7b0a6\">{{ phone }}<\u002Fa>\n          <a href=\"mailto:{{ email }}\" style=\"color:#b7b0a6\">{{ email }}<\u002Fa>\n          <span>16 Hogarth Place<br>London, SW5 0QH<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;padding-top:26px;gap:20px;flex-wrap:wrap\">\n      <span style=\"font:400 12.5px/1 Manrope,sans-serif;color:#6a6459\">© {{ year }} Hyde Park Executive Cars · Company No. 08311629 · All rights reserved<\u002Fspan>\n      <span style=\"font:400 12.5px/1 Manrope,sans-serif;color:#6a6459\">Licensed London Private Hire Operator<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;showTopBar&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Header&quot;},&quot;phone&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+44 (0) 20 7244 6555&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contact&quot;},&quot;email&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;booking@hydeparkcars.com&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Contact&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    step: 1,\n    submitted: false,\n    f: {\n      service: 'airport', trip: 'oneway',\n      from: '', to: '', via: '', showVia: false,\n      date: '', time: '', rdate: '', rtime: '',\n      hours: '', flight: '',\n      pax: '1 passenger', luggage: '1–2 bags', vehicle: 'saloon',\n      name: '', email: '', phone: '', notes: ''\n    }\n  };\n\n  set = (k, v) => this.setState(s => ({ f: { ...s.f, [k]: v } }));\n  onInput = (k) => (e) => this.set(k, e.target.value);\n  toggleVia = () => this.setState(s => ({ f: { ...s.f, showVia: !s.f.showVia } }));\n  next = () => this.setState(s => ({ step: Math.min(4, s.step + 1) }));\n  back = () => this.setState(s => ({ step: Math.max(1, s.step - 1) }));\n  submit = () => this.setState({ submitted: true });\n  reset = () => this.setState({ step: 1, submitted: false });\n\n  chip(active) {\n    return 'text-align:left;padding:13px 14px;border:1.5px solid ' + (active ? '#2f5a46' : '#e0d6c3') +\n      ';background:' + (active ? '#eef4ee' : '#fff') + ';border-radius:3px;cursor:pointer;transition:.15s';\n  }\n  pill(active) {\n    return 'flex:1;text-align:center;padding:12px 8px;border:1.5px solid ' + (active ? '#2f5a46' : '#e0d6c3') +\n      ';background:' + (active ? '#eef4ee' : '#fff') + ';border-radius:3px;cursor:pointer;font:700 13px/1 Manrope,sans-serif;color:' +\n      (active ? '#234a39' : '#5a5348') + ';transition:.15s';\n  }\n\n  renderVals() {\n    const f = this.state.f, step = this.state.step;\n    const isReturn = f.trip === 'return' || f.trip === 'waitreturn';\n    const isDayHire = f.service === 'dayhire';\n    const isAirport = f.service === 'airport';\n\n    const svcDefs = [\n      { id: 'airport', label: 'Airport Transfer', note: 'Meet & greet, flight tracking' },\n      { id: 'dayhire', label: 'Day Hire', note: 'By the hour · 5–24 hrs' },\n      { id: 'event', label: 'Events & Occasions', note: 'Silverstone · cruises · shopping' },\n      { id: 'transfer', label: 'Point-to-Point', note: 'Any London journey' }\n    ];\n    const tripDefs = [\n      { id: 'oneway', label: 'One way' },\n      { id: 'return', label: 'Return' },\n      { id: 'waitreturn', label: 'Wait & return' }\n    ];\n    const vehDefs = [\n      { id: 'saloon', label: 'Executive Saloon', note: 'Mercedes E · BMW 5' },\n      { id: 'luxury', label: 'Luxury Saloon', note: 'Mercedes S · BMW 7' },\n      { id: 'mpv', label: 'People Carrier', note: 'V-Class · up to 7' },\n      { id: 'coach', label: 'Minibus / Coach', note: '8–49 seats' }\n    ];\n\n    const services = svcDefs.map(s => ({ ...s, style: this.chip(f.service === s.id), onSelect: () => this.set('service', s.id) }));\n    const trips = tripDefs.map(t => ({ ...t, style: this.pill(f.trip === t.id), onSelect: () => this.set('trip', t.id) }));\n    const vehicles = vehDefs.map(v => ({ ...v, style: this.chip(f.vehicle === v.id), onSelect: () => this.set('vehicle', v.id) }));\n\n    const progress = [1, 2, 3, 4].map(n => ({\n      style: 'flex:1;height:3px;border-radius:2px;background:' + (n <= step ? '#2f5a46' : '#e0d6c3')\n    }));\n\n    const hoursList = Array.from({ length: 20 }, (_, i) => String(i + 5));\n    const paxList = ['1 passenger', '2 passengers', '3 passengers', '4 passengers', '5 passengers', '6 passengers', '7 passengers', '8+ passengers'];\n    const luggageList = ['No luggage', '1–2 bags', '3–4 bags', '5+ bags', 'Oversized / special'];\n\n    const svcName = (svcDefs.find(s => s.id === f.service) || {}).label || '';\n    const tripName = (tripDefs.find(t => t.id === f.trip) || {}).label || '';\n    const summaryRoute = (f.from || 'Pick-up') + ' → ' + (f.to || 'Destination');\n\n    return {\n      showTopBar: this.props.showTopBar ?? true,\n      phone: this.props.phone ?? '+44 (0) 20 7244 6555',\n      email: this.props.email ?? 'booking@hydeparkcars.com',\n      telHref: (this.props.phone ?? '+44 (0) 20 7244 6555').replace(/[^0-9+]/g, ''),\n      year: new Date().getFullYear(),\n\n      step, f, services, trips, vehicles, progress,\n      hoursList, paxList, luggageList,\n      isStep1: !this.state.submitted && step === 1,\n      isStep2: !this.state.submitted && step === 2,\n      isStep3: !this.state.submitted && step === 3,\n      isStep4: !this.state.submitted && step === 4,\n      submitted: this.state.submitted,\n      isReturn, isDayHire, isAirport,\n      viaLabel: f.showVia ? '– Remove stop-off' : '+ Add a stop-off (via)',\n      toggleVia: this.toggleVia,\n      setFrom: this.onInput('from'), setTo: this.onInput('to'), setVia: this.onInput('via'),\n      setDate: this.onInput('date'), setTime: this.onInput('time'),\n      setRdate: this.onInput('rdate'), setRtime: this.onInput('rtime'),\n      setHours: this.onInput('hours'), setFlight: this.onInput('flight'),\n      setPax: this.onInput('pax'), setLuggage: this.onInput('luggage'), setNotes: this.onInput('notes'),\n      setName: this.onInput('name'), setEmail: this.onInput('email'), setPhone: this.onInput('phone'),\n      back: this.back, reset: this.reset,\n      showNav: !this.state.submitted,\n      showBack: step > 1,\n      primary: step < 4 ? this.next : this.submit,\n      primaryLabel: step < 4 ? 'Continue' : 'Request my quote',\n      summaryService: svcName + ' · ' + tripName,\n      summaryRoute,\n      firstName: (f.name || '').trim().split(' ')[0] || 'there',\n\n      serviceCards: [\n        { title: 'Airport Transfers', img: 'IMAGE — HEATHROW ARRIVALS, CHAUFFEUR WAITING', desc: 'Heathrow, Gatwick, Stansted, Luton & City. Fixed fares, one hour of complimentary waiting, meet & greet and live flight tracking so we\\u2019re there when you land.' },\n        { title: 'Day Hire', img: 'IMAGE — CHAUFFEUR OPENING REAR DOOR', desc: 'Your car and chauffeur by the hour, 5 to 24 hours. Ideal for meetings, viewings or a day of appointments across the capital.' },\n        { title: 'Silverstone & Events', img: 'IMAGE — GRANDSTAND / EVENT ARRIVAL', desc: 'Arrive relaxed at Silverstone, Ascot, Wimbledon or any occasion. We handle the traffic and the parking; you enjoy the day.' },\n        { title: 'Bicester Village', img: 'IMAGE — SHOPPING BAGS IN BOOT', desc: 'A door-to-door shopping run to Bicester Village with room for every bag, and a chauffeur who\\u2019ll wait while you browse.' },\n        { title: 'Southampton Cruise Port', img: 'IMAGE — CRUISE SHIP AT SOUTHAMPTON', desc: 'Start your cruise in comfort. Direct transfers to Southampton with generous luggage capacity and timing built around your embarkation.' },\n        { title: 'Corporate Accounts', img: 'IMAGE — EXECUTIVE ENTERING S-CLASS', desc: 'Consolidated monthly billing, priority dispatch and a consistent standard of chauffeur for your executives and guests.' }\n      ],\n      stats: [\n        { big: '1988', label: 'Serving London since' },\n        { big: 'Fixed', label: 'Rates · no hidden charges' },\n        { big: 'Free', label: 'Meet & greet included' },\n        { big: 'Live', label: 'Flight tracking' },\n        { big: '24/7', label: 'Reservations & support' }\n      ],\n      fleet: [\n        { name: 'Mercedes-Benz E-Class', cap: '3 passengers' },\n        { name: 'Mercedes-Benz S-Class', cap: '3 passengers' },\n        { name: 'BMW 7 Series · Jaguar XJ', cap: '3 passengers' },\n        { name: 'Mercedes-Benz V-Class', cap: 'Up to 7 passengers' },\n        { name: 'Minibuses & Coaches', cap: '12 – 49 seats' }\n      ],\n      partnerPerks: [\n        { title: 'Commission on every ride', desc: 'Earn on each completed journey your concierge books — paid monthly.' },\n        { title: 'Priority dispatch', desc: 'Your guests move to the front of the queue, day or night.' },\n        { title: 'Account billing', desc: 'One consolidated monthly invoice, no cash handling at the desk.' },\n        { title: 'Dedicated front-desk line', desc: 'A direct number your team can rely on 24/7.' }\n      ],\n      partnerStats: [\n        { label: 'Years serving London hotels', val: '35+' },\n        { label: 'Availability', val: '24/7' },\n        { label: 'Payout schedule', val: 'Monthly' }\n      ],\n      testimonials: [\n        { quote: 'Faultless from the airport meet to the door. The only firm our office will book.', who: 'Executive Assistant, Mayfair' },\n        { quote: 'Our guests are consistently delighted. A genuine partner to our concierge team.', who: 'Head Concierge, Kensington Hotel' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
